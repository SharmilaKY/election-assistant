<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Election Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>🗳️ Election Assistant</h1>

    <label for="userInput">Ask your question</label><br><br>

    <input type="text" id="userInput" placeholder="vote / eligible / date / booth"
        aria-label="Election assistant input">

    <button onclick="handleQuery()">Ask</button>

    <p id="response" role="status"></p>

    <br>

    <a href="https://www.google.com/maps/search/polling+booth+near+me" target="_blank">
        📍 Find Your Polling Booth
    </a>

    <script src="script.js"></script>

</body>

</html>

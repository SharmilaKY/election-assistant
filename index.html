<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Election Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>🗳️ Election Assistant</h1>

    <label for="userInput">Ask your question:</label>
    <input type="text" id="userInput" placeholder="e.g. How to vote?" aria-label="Election assistant input">

    <button onclick="handleQuery()" aria-label="Submit question">
        Ask
    </button>

    <p id="response" role="status"></p>

    <br>

    <!-- Google Services Integration (Maps) -->
    <a href="https://www.google.com/maps/search/polling+booth+near+me" target="_blank">
        📍 Find Polling Booth on Google Maps
    </a>

    <script src="script.js"></script>
    <script src="test.js"></script>

</body>

</html>
